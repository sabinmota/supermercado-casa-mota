<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Iniciar Sesión — Supermercado Casa Mota</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="images/logo-casamota.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #1a7c3e;
      --green-dark:  #145e2e;
      --green-light: #27a35a;
      --green-pale:  #e8f5ee;
      --red:         #e53935;
      --text-dark:   #1a1a2e;
      --border:      #e2e8f0;
      --shadow-md:   0 8px 32px rgba(0,0,0,.14);
      --radius:      14px;
      --trans:       .22s ease;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b12;
      position: relative;
      overflow: hidden;
      overflow-x: hidden;
      overscroll-behavior: none;
    }
    html { overflow-x: hidden; }

    /* Fondo animado con gradiente */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(26,124,62,.45) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(21,101,192,.3) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(13,27,18,1) 0%, transparent 100%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      from { opacity: .8; }
      to   { opacity: 1; }
    }

    /* Partículas decorativas */
    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(39,163,90,.5);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Card de login */
    .login-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      margin: 20px;
      background: rgba(255,255,255,.97);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,.1);
      overflow: hidden;
      animation: slideUp .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header de la card */
    .login-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-light) 100%);
      padding: 36px 40px 28px;
      text-align: center;
    }

    .login-logo {
      width: 130px;
      margin-bottom: 14px;
      border-radius: 20px;
      background: #fff;
      padding: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .login-header h2 {
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      opacity: .9;
    }

    .login-header p {
      color: rgba(255,255,255,.75);
      font-size: .82rem;
      margin-top: 4px;
    }

    /* Cuerpo del formulario */
    .login-body {
      padding: 32px 40px 36px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 7px;
      letter-spacing: .3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i.icon-left {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: #aaa;
      font-size: .9rem;
      pointer-events: none;
      transition: color var(--trans);
    }

    .input-wrap input:focus ~ i.icon-left,
    .input-wrap:focus-within i.icon-left { color: var(--green); }

    .input-wrap input {
      width: 100%;
      padding: 11px 42px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .92rem;
      font-family: inherit;
      color: var(--text-dark);
      background: #fafafa;
      transition: border-color var(--trans), box-shadow var(--trans), background var(--trans);
      outline: none;
    }

    .input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,124,62,.12);
      background: #fff;
    }

    .toggle-pass {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: #aaa; cursor: pointer;
      font-size: .9rem;
      padding: 4px;
      transition: color var(--trans);
    }
    .toggle-pass:hover { color: var(--green); }

    /* Mensaje de error */
    .login-error {
      display: none;
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-left: 4px solid var(--red);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
      color: #c62828;
      margin-bottom: 18px;
      animation: shake .35s ease;
    }
    .login-error.show { display: flex; align-items: center; gap: 8px; }

    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-6px); }
      40%    { transform: translateX(6px); }
      60%    { transform: translateX(-4px); }
      80%    { transform: translateX(4px); }
    }

    /* Botón de ingreso */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-light));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--trans), transform var(--trans), box-shadow var(--trans);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 4px 14px rgba(26,124,62,.35);
      margin-top: 4px;
    }

    .btn-login:hover {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,124,62,.45);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login.loading {
      pointer-events: none;
      opacity: .8;
    }

    .btn-login .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Link a la tienda */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: .82rem;
      color: #999;
    }
    .login-footer a {
      color: var(--green);
      text-decoration: none;
      font-weight: 600;
    }
    .login-footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 480px) {
      .login-header { padding: 28px 24px 22px; }
      .login-body   { padding: 24px 24px 28px; }
      .login-logo   { width: 100px; }
    }
  </style>
</head>
<body>

  <!-- Partículas flotantes -->
  <div class="particles" id="particles"></div>

  <div class="login-card">
    <!-- Header -->
    <div class="login-header">
      <img src="images/logo-casamota.png" alt="Supermercado Casa Mota" class="login-logo" />
      <h2>Panel de Administración</h2>
      <p>Inicia sesión con tu cuenta de personal</p>
    </div>

    <!-- Cuerpo -->
    <div class="login-body">

      <!-- Error -->
      <div class="login-error" id="loginError">
        <i class="fas fa-circle-xmark"></i>
        <span id="loginErrorMsg">Correo o contraseña incorrectos.</span>
      </div>

      <!-- Formulario -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <div class="input-wrap">
            <i class="fas fa-envelope icon-left"></i>
            <input type="email" id="loginEmail" placeholder="correo@casamota.com.do" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="loginPass">Contraseña</label>
          <div class="input-wrap">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pass" onclick="togglePassword()" id="togglePassBtn">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-text"><i class="fas fa-right-to-bracket"></i> Ingresar al panel</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="index.html"><i class="fas fa-store"></i> Ver tienda pública</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ─── Redirigir si ya hay sesión activa ───────────────────────────────────
    (function() {
      const session = getSession();
      if (session) window.location.href = 'admin.html';
    })();

    // ─── Partículas decorativas ──────────────────────────────────────────────
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left     = Math.random() * 100 + '%';
        p.style.width    = (Math.random() * 4 + 2) + 'px';
        p.style.height   = p.style.width;
        p.style.animationDuration = (Math.random() * 12 + 6) + 's';
        p.style.animationDelay   = (Math.random() * 8)  + 's';
        p.style.opacity  = Math.random() * 0.6 + 0.2;
        container.appendChild(p);
      }
    })();

    // ─── Login ───────────────────────────────────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pass  = document.getElementById('loginPass').value;
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');

      errEl.classList.remove('show');
      btn.classList.add('loading');

      try {
        const result = await login(email, pass);
        btn.classList.remove('loading');
        if (result.ok) {
          btn.innerHTML = '<i class="fas fa-check"></i> <span>Bienvenido/a ' + result.user.firstName + '!</span>';
          btn.style.background = 'linear-gradient(135deg,#1a7c3e,#27a35a)';
          setTimeout(() => { window.location.href = 'admin.html'; }, 700);
        } else {
          document.getElementById('loginErrorMsg').textContent = result.msg;
          errEl.classList.add('show');
          document.getElementById('loginPass').value = '';
          document.getElementById('loginPass').focus();
        }
      } catch(err) {
        btn.classList.remove('loading');
        document.getElementById('loginErrorMsg').textContent = 'Error de conexión. Intenta de nuevo.';
        errEl.classList.add('show');
      }
    }

    // ─── Toggle contraseña ───────────────────────────────────────────────────
    function togglePassword() {
      const input = document.getElementById('loginPass');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type  = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type  = 'password';
        icon.className = 'fas fa-eye';
      }
    }

  </script>
</body>
</html>
